<!DOCTYPE html>
<html>
<head>
<title>Cooking Competition Game</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#fff3e0;
}

h1{
color:#d35400;
}

.container{
background:white;
width:500px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
padding:10px;
margin:5px;
border:none;
background:#e67e22;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#ca6f1e;
}

#plate{
font-weight:bold;
min-height:30px;
}

</style>

</head>

<body>

<h1>🍳 Cooking Competition Game</h1>

<div class="container">

<h3>Recipe: Burger</h3>
<p>Correct order: Bread → Patty → Cheese → Lettuce → Tomato</p>

<h3>Player: <span id="playerTurn">Player 1</span></h3>

<div>

<button onclick="addIngredient('bread')">Bread</button>
<button onclick="addIngredient('patty')">Patty</button>
<button onclick="addIngredient('cheese')">Cheese</button>
<button onclick="addIngredient('lettuce')">Lettuce</button>
<button onclick="addIngredient('tomato')">Tomato</button>

</div>

<h3>Your Plate:</h3>
<p id="plate"></p>

<button onclick="serveDish()">Serve Dish</button>

<h2 id="timer">Time: 20</h2>

<h2 id="result"></h2>

</div>

<script>

let recipe = ["bread","patty","cheese","lettuce","tomato"]

let players = [
{name:"Player 1", plate:[], score:0},
{name:"Player 2", plate:[], score:0},
{name:"Player 3", plate:[], score:0},
{name:"Player 4", plate:[], score:0},
{name:"Computer Chef", plate:[], score:0}
]

let currentPlayer = 0
let time = 20

let timer = setInterval(updateTimer,1000)

function addIngredient(item){

players[currentPlayer].plate.push(item)

document.getElementById("plate").innerText =
players[currentPlayer].plate.join(", ")

}

function updateTimer(){

time--

document.getElementById("timer").innerText =
"Time: "+time

if(time==0){

serveDish()

}

}

function serveDish(){

clearInterval(timer)

let plate = players[currentPlayer].plate

let correct = 0

for(let i=0;i<recipe.length;i++){

if(plate[i]==recipe[i]){
correct++
}

}

let taste = correct*20
let speed = time>0?time:0
let presentation = Math.floor(Math.random()*20)

let total = taste + speed + presentation

players[currentPlayer].score = total

document.getElementById("result").innerText =
players[currentPlayer].name+
" Score: "+total

nextPlayer()

}

function nextPlayer(){

currentPlayer++

if(currentPlayer < players.length-1){

players[currentPlayer].plate=[]
document.getElementById("plate").innerText=""

time=20
timer=setInterval(updateTimer,1000)

document.getElementById("playerTurn").innerText=
players[currentPlayer].name

}

else{

computerTurn()

}

}

function computerTurn(){

let correct = Math.floor(Math.random()*5)

let taste = correct*20
let speed = Math.floor(Math.random()*20)
let presentation = Math.floor(Math.random()*20)

players[4].score = taste + speed + presentation

showWinner()

}

function showWinner(){

let winner = players[0]

for(let p of players){

if(p.score > winner.score){
winner = p
}

}

document.getElementById("result").innerText =
"🏆 Winner: "+winner.name+
" with "+winner.score+" points!"

}

</script>

</body>
</html>
