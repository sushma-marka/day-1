<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cooking Competition Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff8e1;
        }
        h1, h2, h3 {
            text-align: center;
        }
        #start-screen, #game-screen, #score-screen {
            display: none;
            padding: 20px;
        }
        .visible {
            display: block;
        }
        .ingredient-btn {
            margin: 5px;
            padding: 10px 15px;
            background: #ffcc80;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .ingredient-btn.selected {
            background: #ffa726;
        }
        #chosen-list {
            min-height: 40px;
            padding: 10px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }
        #timer {
            font-size: 1.5em;
            text-align: center;
        }
        .score-table {
            width: 100%;
            border-collapse: collapse;
        }
        .score-table th, .score-table td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="start-screen" class="visible">
        <h1>Cooking Competition</h1>
        <label>Number of human players (2-4): <input id="player-count" type="number" min="2" max="4" value="2" /></label><br />
        <label><input id="include-ai" type="checkbox" /> Include computer opponent</label><br />
        <button id="start-btn">Start Game</button>
    </div>
    <div id="game-screen">
        <h2 id="current-player-heading"></h2>
        <div id="timer">Time: <span id="time-value">--</span>s</div>
        <h3>Recipe: <span id="recipe-name"></span></h3>
        <div id="ingredient-buttons"></div>
        <div>
            <strong>Chosen ingredients order:</strong>
            <div id="chosen-list"></div>
        </div>
        <button id="finish-btn">Finish & Serve</button>
    </div>
    <div id="score-screen">
        <h2>Round Results</h2>
        <table class="score-table" id="score-table">
            <thead>
                <tr><th>Player</th><th>Taste</th><th>Presentation</th><th>Speed</th><th>Total</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        <button id="next-round-btn">Next Round</button>
    </div>
    <script>
        // game data and logic
        const recipe = {
            name: 'Fresh Salad',
            ingredients: ['Lettuce', 'Tomato', 'Cucumber', 'Dressing']
        };

        let players = [];
        let currentIndex = 0;
        let timerInterval = null;
        const TIME_LIMIT = 30;

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('finish-btn').addEventListener('click', finishPlayer);
        document.getElementById('next-round-btn').addEventListener('click', nextRound);

        function startGame() {
            const count = parseInt(document.getElementById('player-count').value);
            const includeAI = document.getElementById('include-ai').checked;
            players = [];
            for (let i = 0; i < count; i++) {
                players.push({ name: 'Player ' + (i + 1), score: 0 });
            }
            if (includeAI) {
                players.push({ name: 'Computer Chef', isAI: true, score: 0 });
            }
            currentIndex = 0;
            showScreen('game');
            startPlayerTurn();
        }

        function showScreen(id) {
            ['start-screen', 'game-screen', 'score-screen'].forEach(screen => {
                document.getElementById(screen).classList.remove('visible');
            });
            document.getElementById(id + '-screen').classList.add('visible');
        }

        function startPlayerTurn() {
            const player = players[currentIndex];
            document.getElementById('current-player-heading').textContent = player.name + (player.isAI ? ' (AI)' : '');
            document.getElementById('recipe-name').textContent = recipe.name;
            renderIngredients();
            resetChosen();
            startTimer();
            if (player.isAI) {
                simulateAI(player);
            }
        }

        function renderIngredients() {
            const container = document.getElementById('ingredient-buttons');
            container.innerHTML = '';
            recipe.ingredients.forEach(ing => {
                const btn = document.createElement('button');
                btn.textContent = ing;
                btn.className = 'ingredient-btn';
                btn.addEventListener('click', () => selectIngredient(btn, ing));
                container.appendChild(btn);
            });
        }

        function selectIngredient(btn, ing) {
            if (btn.classList.contains('selected')) return;
            btn.classList.add('selected');
            const list = document.getElementById('chosen-list');
            const item = document.createElement('span');
            item.textContent = ing + ' ';
            list.appendChild(item);
        }

        function resetChosen() {
            document.getElementById('chosen-list').innerHTML = '';
            document.querySelectorAll('.ingredient-btn').forEach(b => b && b.classList.remove('selected'));
        }

        function startTimer() {
            let time = TIME_LIMIT;
            document.getElementById('time-value').textContent = time;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                time -= 1;
                document.getElementById('time-value').textContent = time;
                if (time <= 0) {
                    clearInterval(timerInterval);
                    finishPlayer();
                }
            }, 1000);
        }

        function finishPlayer() {
            clearInterval(timerInterval);
            const player = players[currentIndex];
            const chosen = Array.from(document.getElementById('chosen-list').children).map(c => c.textContent.trim());
            const scores = scoreDish(chosen, player);
            player.score = scores.total;
            player.lastScores = scores; // keep detail for display
            showScoreScreen();
        }

        function scoreDish(chosen, player) {
            let taste = 0;
            recipe.ingredients.forEach((ing, idx) => {
                if (chosen[idx] === ing) taste += 10;
            });
            const presentation = Math.floor(Math.random() * 11);
            const timeLeft = parseInt(document.getElementById('time-value').textContent || TIME_LIMIT);
            // speed score higher when more time remaining (faster prep)
            const speed = Math.max(0, Math.min(10, timeLeft));
            const total = taste + presentation + speed;
            return { taste, presentation, speed, total };
        }

        function showScoreScreen() {
            const tbody = document.querySelector('#score-table tbody');
            tbody.innerHTML = '';
            players.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${p.name}</td><td>${p.lastScores?.taste||''}</td><td>${p.lastScores?.presentation||''}</td><td>${p.lastScores?.speed||''}</td><td>${p.score}</td>`;
                tbody.appendChild(tr);
            });
            showScreen('score');
        }

        function nextRound() {
            currentIndex += 1;
            if (currentIndex >= players.length) {
                announceWinner();
            } else {
                showScreen('game');
                startPlayerTurn();
            }
        }

        function announceWinner() {
            const winner = players.reduce((a, b) => (a.score > b.score ? a : b));
            alert('Winner: ' + winner.name + ' with ' + winner.score + ' points!');
            showScreen('start');
        }

        function simulateAI(player) {
            // random sequence and timing
            const sequence = recipe.ingredients.slice().sort(() => Math.random() - 0.5);
            let idx = 0;
            const interval = setInterval(() => {
                if (idx < sequence.length) {
                    const btns = Array.from(document.querySelectorAll('.ingredient-btn'));
                    const btn = btns.find(b => b.textContent === sequence[idx]);
                    if (btn) btn.click();
                    idx += 1;
                } else {
                    clearInterval(interval);
                    // finish after a short pause
                    setTimeout(finishPlayer, Math.random() * 2000 + 500);
                }
            }, Math.random() * 2000 + 500);
        }
    </script>
</body>
</html>
